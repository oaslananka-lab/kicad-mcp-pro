version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Istanbul
    # Renovate owns regular version-update PRs. Dependabot stays enabled for
    # GitHub security updates and alert-driven remediation only.
    open-pull-requests-limit: 0
    versioning-strategy: increase-if-necessary
    cooldown:
      default-days: 3
    groups:
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
    labels:
      - dependencies
      - type:security
      - needs:triage
      - area:python

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:20"
      timezone: Europe/Istanbul
    # Renovate owns regular version-update PRs. Dependabot stays enabled for
    # GitHub security updates and alert-driven remediation only.
    open-pull-requests-limit: 0
    versioning-strategy: auto
    cooldown:
      default-days: 3
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    labels:
      - dependencies
      - type:security
      - needs:triage
      - area:js

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:40"
      timezone: Europe/Istanbul
    # Renovate owns regular version-update PRs. Dependabot stays enabled for
    # GitHub security updates and alert-driven remediation only.
    open-pull-requests-limit: 0
    cooldown:
      default-days: 3
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
    labels:
      - dependencies
      - type:security
      - needs:triage
      - type:chore
