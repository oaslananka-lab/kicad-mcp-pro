name: Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --frozen
      - run: uv run mkdocs build --strict
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: --verbose --no-progress README.md docs/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy Docs
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --frozen
      - run: uv run mkdocs build --strict
      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          touch site/.nojekyll
          git -C site init
          git -C site config user.name "github-actions[bot]"
          git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site add .
          git -C site commit -m "docs: publish site"
          git -C site branch -M gh-pages
          origin_auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w0)"
          echo "::add-mask::${origin_auth_header}"
          git -C site remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C site -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${origin_auth_header}" push --force origin gh-pages
      - name: Mirror canonical GitHub Pages
        env:
          CANONICAL_PAGES_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CANONICAL_PAGES_TOKEN}" ]; then
            echo "::error::DOPPLER_GITHUB_SERVICE_TOKEN is required to publish https://oaslananka.github.io/kicad-mcp-pro."
            exit 1
          fi
          auth_header="$(printf 'x-access-token:%s' "${CANONICAL_PAGES_TOKEN}" | base64 -w0)"
          echo "::add-mask::${auth_header}"
          git -C site remote add canonical "https://github.com/oaslananka/kicad-mcp-pro.git"
          git -C site -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" push --force canonical gh-pages
