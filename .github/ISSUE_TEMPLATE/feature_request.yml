name: Feature request
description: Propose a capability, workflow, or integration.
title: "[Feature]: "
labels:
  - type:feature
  - status:triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is blocked or painful today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the desired behavior, tool surface, docs, or workflow.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - PCB
        - Schematic
        - Export/manufacturing
        - IPC/transport
        - Routing
        - Simulation
        - Docs
        - CI/release
        - Other
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Expected risk
      options:
        - Low
        - Medium
        - High
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: automation_allowed
    attributes:
      label: May a coding agent work on this?
      options:
        - Yes, if maintainers mark it agent:candidate
        - No, human maintainer only
        - Not sure
    validations:
      required: true
  - type: textarea
    id: done_criteria
    attributes:
      label: Done criteria
      description: What should be true when this is complete?
      placeholder: |
        - New behavior is documented
        - Tests cover the workflow
        - Existing public API compatibility is clear
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or competing approach?
  - type: textarea
    id: notes
    attributes:
      label: Additional context
