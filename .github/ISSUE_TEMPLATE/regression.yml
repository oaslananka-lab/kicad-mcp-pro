name: Regression
description: Report behavior that worked in an earlier version and now fails.
title: "[Regression]: "
labels:
  - regression
  - type:bug
  - status:triage
body:
  - type: input
    id: last_good
    attributes:
      label: Last working version
      placeholder: "3.0.1"
    validations:
      required: true
  - type: input
    id: first_bad
    attributes:
      label: First broken version
      placeholder: "3.0.2"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include project fixture details if possible.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is blocked and how severe is the regression?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      render: text
      placeholder: |
        OS:
        KiCad:
        Python:
        MCP client:
        Transport:
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      options:
        - Low
        - Medium
        - High
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: automation_allowed
    attributes:
      label: May a coding agent work on this?
      options:
        - Yes, if maintainers mark it agent:candidate
        - No, human maintainer only
        - Not sure
    validations:
      required: true
  - type: textarea
    id: done_criteria
    attributes:
      label: Done criteria
      description: What observable behavior proves the regression is fixed?
    validations:
      required: true
