name: Documentation issue
description: Report missing, confusing, or incorrect documentation.
title: "[Docs]: "
labels:
  - type:docs
  - status:triage
body:
  - type: input
    id: page
    attributes:
      label: Page or section
      placeholder: "docs/installation.md"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested correction
  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      options:
        - Low
        - Medium
        - High
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: automation_allowed
    attributes:
      label: May a coding agent work on this?
      options:
        - Yes, if maintainers mark it agent:candidate
        - No, human maintainer only
        - Not sure
    validations:
      required: true
  - type: textarea
    id: done_criteria
    attributes:
      label: Done criteria
      description: What documentation state would resolve this?
    validations:
      required: true
